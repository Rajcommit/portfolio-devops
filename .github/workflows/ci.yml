name: DevOps Portfolio CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  health-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: echo "Pipeline running ✓"

  shellcheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ludeeus/action-shellcheck@2.0.0
        with:
          scandir: './scripts'

  html-validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - run: npx html-validate index.html about.html projects.html

  link-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: lycheeverse/lychee-action@v1
        with:
          args: >-
            --no-progress
            --exclude linkedin.com
            --exclude wa.me
            --exclude fonts.googleapis.com
            --exclude fonts.gstatic.com
            --exclude medium.com
            --exclude dev.to
            --exclude gitlab.com
            '*.html'
          fail: true

  accessibility:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - run: |
          npm install -g pa11y serve
          npx puppeteer browsers install chrome
      - name: Start server
        run: npx serve . -l 8080 &
      - name: Wait for server
        run: sleep 3
      - name: Run Pa11y on all pages
        run: |
          pa11y http://localhost:8080/index.html --threshold 5 --launch-options '{"args":["--no-sandbox","--disable-setuid-sandbox"]}'
          pa11y http://localhost:8080/about.html --threshold 5 --launch-options '{"args":["--no-sandbox","--disable-setuid-sandbox"]}'
          pa11y http://localhost:8080/projects.html --threshold 5 --launch-options '{"args":["--no-sandbox","--disable-setuid-sandbox"]}'
